name: NUR Readiness

on:
  pull_request:
  push:
    branches: [main]

jobs:
  web-and-security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run secret-scan
      - run: npm run web:typecheck
      - run: npm run web:test
      - run: npm run web:build
      - run: npm run web:e2e:mocked
      - run: npm run mobile:typecheck
      - run: npm audit --audit-level=high

  api:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install -e ".[dev]"
        working-directory: apps/api
      - run: python -m ruff check app
        working-directory: apps/api
      - run: python -m pytest
        working-directory: apps/api
        env:
          NUR_TEST_SUPERUSER_DSN: postgresql://postgres:postgres@localhost:5432/postgres
